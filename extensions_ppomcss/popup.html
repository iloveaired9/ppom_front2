<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      width: 350px;
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .status-badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .stats-main {
      text-align: center;
      margin-bottom: 10px;
    }

    .percentage {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      text-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
    }

    .label {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .progress-bar-container {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin: 15px 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      width: 0%;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }

    .detail-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .detail-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .action-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 16px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>PpomCSS Audit</h1>
      <span class="status-badge">Active</span>
    </header>

    <div class="card">
      <div class="stats-main">
        <div class="percentage" id="coverage-percent">0%</div>
        <div class="label">Total CSS Coverage</div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="details-grid">
        <div class="detail-item">
          <div class="detail-value" id="used-rules">0</div>
          <div class="detail-label">Used Rules</div>
        </div>
        <div class="detail-item">
          <div class="detail-value" id="total-rules">0</div>
          <div class="detail-label">Total Rules</div>
        </div>
      </div>
    </div>

    <button id="analyze-btn" class="action-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      Run Audit Now
    </button>

    <div class="footer">
      Powered by Antigravity AI • v1.0
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
